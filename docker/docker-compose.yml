x-es-vars: &es-vars
  ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
x-minio-vars: &minio-vars
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_REGION: ${MINIO_REGION}
  MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET}
x-proxy-vars: &proxy-vars
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}

services:
  nexent-elasticsearch:
    image: ${ELASTICSEARCH_IMAGE}
    container_name: nexent-elasticsearch
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      # Single node mode
      discovery.type: single-node
      # Security settings
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      # JVM memory settings
      ES_JAVA_OPTS: ${ES_JAVA_OPTS}
      # Node name
      node.name: es01
      # Memory lock setting
      bootstrap.memory_lock: "false"
      # Disk watermark settings
      cluster.routing.allocation.disk.watermark.low: "${ES_DISK_WATERMARK_LOW}"
      cluster.routing.allocation.disk.watermark.high: "${ES_DISK_WATERMARK_HIGH}"
      cluster.routing.allocation.disk.watermark.flood_stage: "${ES_DISK_WATERMARK_FLOOD_STAGE}"
    volumes:
      - ${ROOT_DIR}/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9210:9200" # HTTP API
      - "9310:9300" # Cluster communication port
    networks:
      - nexent
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE ''"status":"(green|yellow)"'' || exit 1',
        ]
      interval: 5s
      timeout: 10s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "100m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep

  nexent-postgresql:
    image: ${POSTGRESQL_IMAGE}
    container_name: nexent-postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${NEXENT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${ROOT_DIR}/postgresql/data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    security_opt:
      - seccomp:unconfined
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep
    networks:
      - nexent

  nexent-config:
    image: ${NEXENT_IMAGE}
    container_name: nexent-config
    restart: always
    ports:
      - "5010:5010" # Config service port
    volumes:
      - ${NEXENT_USER_DIR:-$HOME/nexent}:/mnt/nexent
      - ${ROOT_DIR}/openssh-server/ssh-keys:/opt/ssh-keys:ro
      - ${ROOT_DIR}/scripts/sync_user_supabase2pg.py:/opt/sync_user_supabase2pg.py:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # Docker socket for MCP container management
    environment:
      <<: [*minio-vars, *es-vars]
      skip_proxy: "true"
      UMASK: 0022
    env_file:
      - .env
    user: root
    depends_on:
      nexent-elasticsearch:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep
    networks:
      - nexent
    entrypoint: ["/bin/bash", "-c", "python backend/config_service.py"]

  nexent-runtime:
    image: ${NEXENT_IMAGE}
    container_name: nexent-runtime
    restart: always
    ports:
      - "5014:5014" # Runtime service port
    volumes:
      - ${NEXENT_USER_DIR:-$HOME/nexent}:/mnt/nexent
      - ${ROOT_DIR}/openssh-server/ssh-keys:/opt/ssh-keys:ro
    environment:
      <<: [*minio-vars, *es-vars]
      skip_proxy: "true"
      UMASK: 0022
    env_file:
      - .env
    user: root
    depends_on:
      nexent-elasticsearch:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep
    networks:
      - nexent
    entrypoint: ["/bin/bash", "-c", "python backend/runtime_service.py"]

  nexent-mcp:
    image: ${NEXENT_IMAGE}
    container_name: nexent-mcp
    restart: always
    ports:
      - "5011:5011" # MCP service port
      - "5015:5015" # MCP management API port
    volumes:
      - ${NEXENT_USER_DIR:-$HOME/nexent}:/mnt/nexent
      - ${ROOT_DIR}/openssh-server/ssh-keys:/opt/ssh-keys:ro
    environment:
      <<: [*minio-vars, *es-vars]
      skip_proxy: "true"
      UMASK: 0022
    env_file:
      - .env
    user: root
    depends_on:
      nexent-elasticsearch:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep
    networks:
      - nexent
    entrypoint: ["/bin/bash", "-c", "python backend/mcp_service.py"]

  nexent-northbound:
    image: ${NEXENT_IMAGE}
    container_name: nexent-northbound
    restart: always
    ports:
      - "5013:5013" # Northbound service port
    volumes:
      - ${NEXENT_USER_DIR:-$HOME/nexent}:/mnt/nexent
      - ${ROOT_DIR}/openssh-server/ssh-keys:/opt/ssh-keys:ro
    environment:
      <<: [*minio-vars, *es-vars]
      skip_proxy: "true"
      UMASK: 0022
    env_file:
      - .env
    user: root
    depends_on:
      nexent-elasticsearch:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep
    networks:
      - nexent
    entrypoint: ["/bin/bash", "-c", "python backend/northbound_service.py"]

  nexent-web:
    image: ${NEXENT_WEB_IMAGE}
    container_name: nexent-web
    restart: always
    networks:
      - nexent
    ports:
      - "3000:3000"
    environment:
      - HTTP_BACKEND=http://nexent-config:5010
      - WS_BACKEND=ws://nexent-runtime:5014
      - RUNTIME_HTTP_BACKEND=http://nexent-runtime:5014
      - MINIO_ENDPOINT=http://nexent-minio:9000
      - MARKET_BACKEND=http://60.204.251.153:8010
      - MODEL_ENGINE_ENABLED=${MODEL_ENGINE_ENABLED:-false}
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep

  nexent-data-process:
    image: ${NEXENT_DATA_PROCESS_IMAGE}
    container_name: nexent-data-process
    command: bash
    restart: always
    privileged: true
    ports:
      - "5012:5012"
      - "5555:5555" # Celery Flower port
      - "8265:8265" # Ray Dashboardport
    volumes:
      - ${NEXENT_USER_DIR:-$HOME/nexent}:/mnt/nexent
    environment:
      <<: [*proxy-vars, *es-vars, *minio-vars]
      DOCKER_ENVIRONMENT: "true"
      PYTHONPATH: "/opt/backend"
      skip_proxy: "true"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      nexent-elasticsearch:
        condition: service_healthy
    networks:
      - nexent
    entrypoint: >
      /bin/sh -c "
        python /opt/backend/data_process_service.py || (cd /opt/backend && OPENBLAS_NUM_THREADS=1 UVICORN_LOOP=asyncio uvicorn data_process_service:app --host 0.0.0.0 --port 5012)
      "

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: ${REDIS_IMAGE}
    container_name: nexent-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec --save "900 1" --save "300 10" --save "60 10000" --dir /data --maxmemory-policy allkeys-lru
    volumes:
      - ${ROOT_DIR}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - nexent

  nexent-minio:
    image: ${MINIO_IMAGE}
    container_name: nexent-minio
    command: server /data
    ports:
      - "9010:9000" # MinIO API port
      - "9011:9001" # MinIO Console port
    environment:
      <<: [*minio-vars, *proxy-vars]
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${ROOT_DIR}/minio/data:/etc/minio/data
    networks:
      - nexent
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep
    entrypoint: >
      /bin/sh -c "
        minio server /etc/minio/data --address ':9000' --console-address ':9001' &
        MINIO_PID=$$!
        sleep 3
        mc alias set myadmin http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
        mc admin user add myadmin $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
        mc admin policy attach myadmin readwrite --user=$MINIO_ACCESS_KEY
        mc mb myadmin/$MINIO_DEFAULT_BUCKET
        mc anonymous set download myadmin/$MINIO_DEFAULT_BUCKET
        mc ilm rule add myadmin/$MINIO_DEFAULT_BUCKET --prefix 'preview/' --expiry-days 7 --id expire-converted-pdfs
        wait $$MINIO_PID
      "

  nexent-openssh-server:
    image: ${OPENSSH_SERVER_IMAGE}
    container_name: nexent-openssh-server
    hostname: nexent-openssh-server
    environment:
      - DEV_USER=${SSH_USERNAME:-linuxserver.io}
      - DEV_PASSWORD=${SSH_PASSWORD:-nexent123}
    ports:
      - "2222:22" # SSH port
    volumes:
      - ${TERMINAL_MOUNT_DIR:-./workspace}:/opt/terminal
    networks:
      - nexent
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Maximum size of a single log file
        max-file: "3" # Maximum number of log files to keep
    profiles:
      - terminal

networks:
  nexent:
    driver: bridge

volumes:
  redis_data:
