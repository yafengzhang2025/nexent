{{- if eq .Values.global.deploymentVersion "full" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexent-supabase-auth
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-supabase-auth
  annotations:
    "helm.sh/hook-weight": "0"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nexent-supabase-auth
  template:
    metadata:
      labels:
        app: nexent-supabase-auth
    spec:
      initContainers:
        - name: init-db
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: {{ .Values.config.postgresHost | quote }}
            - name: DB_PORT
              value: {{ .Values.config.postgresPort | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until pg_isready -h $(DB_HOST) -p $(DB_PORT) -U postgres; do
              echo "Waiting for database to start..."
              sleep 2
              done
            - echo "Database is ready"
      containers:
        - name: supabase-auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: GOTRUE_API_HOST
              value: "0.0.0.0"
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: API_EXTERNAL_URL
              value: {{ .Values.config.apiExternalUrl | quote }}
            - name: GOTRUE_DB_DRIVER
              value: "postgres"
            - name: GOTRUE_DB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: GOTRUE_DB_DATABASE_URL
            - name: GOTRUE_SITE_URL
              value: {{ .Values.config.siteUrl | quote }}
            - name: GOTRUE_URI_ALLOW_LIST
              value: {{ .Values.config.additionalRedirectUrls | quote }}
            - name: GOTRUE_DISABLE_SIGNUP
              value: {{ .Values.config.disableSignup | quote }}
            - name: GOTRUE_JWT_ADMIN_ROLES
              value: "service_role"
            - name: GOTRUE_JWT_AUD
              value: "authenticated"
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: "authenticated"
            - name: GOTRUE_JWT_EXP
              value: {{ .Values.config.jwtExpiry | quote }}
            - name: GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: JWT_SECRET
            - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
              value: {{ .Values.config.enableEmailSignup | quote }}
            - name: GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED
              value: {{ .Values.config.enableAnonymousUsers | quote }}
            - name: GOTRUE_MAILER_AUTOCONFIRM
              value: {{ .Values.config.enableEmailAutoconfirm | quote }}
            - name: GOTRUE_MAILER_URLPATHS_INVITE
              value: {{ .Values.config.mailerUrlpathsInvite | quote }}
            - name: GOTRUE_MAILER_URLPATHS_CONFIRMATION
              value: {{ .Values.config.mailerUrlpathsConfirmation | quote }}
            - name: GOTRUE_MAILER_URLPATHS_RECOVERY
              value: {{ .Values.config.mailerUrlpathsRecovery | quote }}
            - name: GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE
              value: {{ .Values.config.mailerUrlpathsEmailChange | quote }}
            - name: GOTRUE_EXTERNAL_PHONE_ENABLED
              value: {{ .Values.config.enablePhoneSignup | quote }}
            - name: GOTRUE_SMS_AUTOCONFIRM
              value: {{ .Values.config.enablePhoneAutoconfirm | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 30
            periodSeconds: 10
          ports:
            - containerPort: 9999
              name: auth
              protocol: TCP
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
{{- end }}
