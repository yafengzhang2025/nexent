apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexent-web
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-web
  annotations:
    "helm.sh/hook-weight": "20"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nexent-web
  template:
    metadata:
      labels:
        app: nexent-web
    spec:
      containers:
        - name: nexent-web
          image: "{{ .Values.images.web.repository }}:{{ .Values.images.web.tag }}"
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: HTTP_BACKEND
              value: "http://nexent-config:5010"
            - name: WS_BACKEND
              value: "ws://nexent-runtime:5014"
            - name: RUNTIME_HTTP_BACKEND
              value: "http://nexent-runtime:5014"
            - name: MINIO_ENDPOINT
              value: "http://nexent-minio:9000"
            - name: MARKET_BACKEND
              value: {{ .Values.config.marketBackend | quote }}
            - name: MODEL_ENGINE_ENABLED
              value: {{ .Values.config.modelEngine.enabled | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.web.requests.memory }}
              cpu: {{ .Values.resources.web.requests.cpu }}
            limits:
              memory: {{ .Values.resources.web.limits.memory }}
              cpu: {{ .Values.resources.web.limits.cpu }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
