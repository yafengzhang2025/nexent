{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: nexent-openssh-server
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.services.openssh.type }}
  ports:
    - port: 22
      targetPort: 22
      name: ssh
      nodePort: {{ .Values.services.openssh.nodePort }}
  selector:
    app: nexent-openssh-server
{{- end }}
