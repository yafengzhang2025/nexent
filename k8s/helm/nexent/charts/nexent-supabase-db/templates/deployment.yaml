{{- if eq .Values.global.deploymentVersion "full" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexent-supabase-db
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-supabase-db
  annotations:
    "helm.sh/hook-weight": "-1"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nexent-supabase-db
  template:
    metadata:
      labels:
        app: nexent-supabase-db
    spec:
      initContainers:
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Copying init scripts into existing image script directory..."
              cp -r /docker-entrypoint-initdb.d/* /initdb.d/
              cp /custom-init-scripts/98-webhooks.sql /initdb.d/init-scripts/
              cp /custom-init-scripts/99-roles.sql /initdb.d/init-scripts/
              cp /custom-init-scripts/99-jwt.sql /initdb.d/init-scripts/

              cp /custom-init-scripts/99-logs.sql /initdb.d/migrations/
              cp /custom-init-scripts/99-realtime.sql /initdb.d/migrations/
              cp /custom-init-scripts/97-_supabase.sql /initdb.d/migrations/
              cp /custom-init-scripts/99-pooler.sql /initdb.d/migrations/

              echo "Copying user-defined migration scripts..."
              cp /custom-migrations/* /initdb.d/migrations/ || echo "Skip migrations"
              echo "Initialization scripts are ready"
          volumeMounts:
            - mountPath: /custom-init-scripts
              name: custom-init-scripts
            - mountPath: /initdb.d
              name: initdb-scripts-data
            - mountPath: /custom-migrations
              name: custom-migrations
      containers:
        - name: supabase-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.config.postgresPort | int }}
              name: postgres
          env:
            - name: POSTGRES_HOST
              value: /var/run/postgresql
            - name: PGPORT
              value: {{ .Values.config.postgresPort | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.config.postgresPort | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: SUPABASE_POSTGRES_PASSWORD
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: SUPABASE_POSTGRES_PASSWORD
            - name: PGDATABASE
              value: {{ .Values.config.postgresDb | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.config.postgresDb | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexent-secrets
                  key: JWT_SECRET
                  optional: true
            - name: JWT_EXP
              value: {{ .Values.config.jwtExpiry | quote }}
          volumeMounts:
            - mountPath: /docker-entrypoint-initdb.d
              name: initdb-scripts-data
            - mountPath: /var/lib/postgresql/data
              name: supabase-db-data
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}
            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: initdb-scripts-data
          emptyDir:
            medium: ""
        - name: custom-init-scripts
          configMap:
            name: nexent-supabase-db-init
        - name: custom-migrations
          configMap:
            name: nexent-supabase-db-migrations
        - name: supabase-db-data
          persistentVolumeClaim:
            claimName: nexent-supabase-db
{{- end }}
