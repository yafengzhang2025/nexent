apiVersion: v1
kind: Service
metadata:
  name: nexent-elasticsearch
  namespace: {{ .Values.global.namespace }}
  labels:
    app: nexent-elasticsearch
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: 9200
      name: http
    - port: 9300
      targetPort: 9300
      name: transport
  selector:
    app: nexent-elasticsearch
